apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: vllm-autoscale
  namespace: ai-inference
  labels:
    app.kubernetes.io/part-of: eagles-ai-platform
spec:
  hosts:
    - vllm.internal
  pathPrefixes:
    - /v1/
  scaleTargetRef:
    name: vllm-server
    kind: Deployment
    apiVersion: apps/v1
    service: vllm-server-svc
    port: 8000
  replicas:
    min: 0
    max: 2
  scalingMetric:
    requestRate:
      granularity: 1s
      targetValue: "5"
      window: 60s
  scaledownPeriod: 900   # 15 min idle -> scale to 0
